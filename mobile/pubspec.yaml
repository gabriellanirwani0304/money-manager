name: money_manager
description: Personal finance manager - track income & expenses
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # HTTP client
  dio: ^5.7.0

  # Secure storage for tokens
  flutter_secure_storage: ^9.2.0

  # Charts
  fl_chart: ^0.69.0

  # Date formatting & localization
  intl: ^0.19.0

  # Local preferences
  shared_preferences: ^2.3.0

  # File sharing & saving (CSV export)
  share_plus: ^10.0.0
  path_provider: ^2.1.5

  # File picking (CSV import)
  file_picker: ^8.1.2

  # Icons
  cupertino_icons: ^1.0.8

  # Lottie animations
  lottie: ^3.1.2

  # Shimmer loading
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/

  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700
        - asset: assets/fonts/Nunito-ExtraBold.ttf
          weight: 800
